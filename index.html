<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Chat v7.0 | Elite Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #06b6d4; }
        body { 
            background: radial-gradient(circle at top left, #0f172a, #020617); 
            font-family: 'JetBrains Mono', monospace; 
            overflow-x: hidden;
        }
        
        .glass-pro { 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glow-border {
            position: relative;
            border-radius: 1.5rem;
            background: rgba(15, 23, 42, 0.9);
        }
        .glow-border::before {
            content: ""; position: absolute; inset: -1px; 
            background: linear-gradient(45deg, #0ea5e9, transparent, #10b981, transparent);
            border-radius: 1.5rem; z-index: -1; 
            animation: rotate 6s linear infinite; opacity: 0.5;
        }
        @keyframes rotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        .burn-flash { animation: flash 0.6s cubic-bezier(0.45, 0, 0.55, 1) forwards; }
        @keyframes flash { 
            0% { filter: brightness(1) blur(0); } 
            50% { filter: brightness(10) blur(10px); } 
            100% { filter: brightness(0) blur(40px); opacity: 0; } 
        }

        .mes-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-drop { border: 2px dashed rgba(6, 182, 212, 0.3); transition: all 0.3s; }
        .file-drop.dragover { border-color: #06b6d4; background: rgba(6, 182, 212, 0.1); }

        .progress-bar { 
            background: linear-gradient(90deg, #06b6d4 0%, #10b981 100%);
            height: 2px; 
            transition: width 0.3s;
            box-shadow: 0 0 10px #06b6d4;
        }
        
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #06b6d4;
            border-radius: 50%;
            margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="max-w-xl w-full glow-border glass-pro p-1 shadow-2xl transition-all duration-700">

                    <button id="copy-btn" class="absolute bottom-4 right-4 bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold hidden uppercase transition-all shadow-lg">Copy Token</button>

                        <div class="flex flex-col">
                            <span class="text-[8px] text-slate-500 font-bold tracking-widest">SESSION</span>

                        </div>
                    </div>
                    <div class="text-right">
                        <span id="safety-number" class="text-[10px] text-cyan-400 font-black tracking-widest bg-cyan-500/10 px-3 py-1.5 rounded-lg border border-cyan-500/20">SN: ---- ----</span>
                    </div>
                </div>

                <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 scroll-smooth"></div>

                <div id="file-progress" class="hidden mb-2 bg-slate-900 rounded-lg overflow-hidden">
                    <div class="flex justify-between text-[9px] px-2 py-1 text-slate-400">
                        <span id="file-name">transferring...</span>
                        <span id="file-percent">0%</span>

                    <div class="w-full bg-slate-800 h-0.5">
                        <div id="progress-fill" class="progress-bar w-0"></div>
                    </div>

                <div class="flex gap-2 p-1.5 bg-slate-900/80 rounded-2xl border border-slate-800 focus-within:border-cyan-500/50 transition-all shadow-inner relative">
                    <input type="file" id="file-input" class="hidden" onchange="sendFile(this.files[0])">
                    <button onclick="document.getElementById('file-input').click()" class="px-3 text-slate-500 hover:text-cyan-400 transition-colors" title="Attach File">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </button>
                    <input id="msg-input" type="text" autocomplete="off" class="flex-1 bg-transparent px-2 outline-none text-xs text-white placeholder-slate-600" placeholder="Transmit secure packet...">
                    <button id="send-btn" class="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] hover:bg-cyan-500 hover:text-white transition-all uppercase">Send</button>
                </div>
                
                <div class="flex justify-between items-center mt-4 px-2">
                    <button onclick="triggerRekey()" class="text-[9px] text-slate-600 hover:text-cyan-400 uppercase font-bold tracking-widest transition-colors" title="Rotate Session Keys">
                        [RE-KEY SESSION]
                    </button>
                    <button class="group flex items-center gap-2 text-slate-700 hover:text-red-500 transition-colors" onclick="nuclearBurn()">
                        <span class="h-px w-8 bg-slate-800 group-hover:bg-red-900"></span>
                        <span class="text-[9px] font-black uppercase tracking-[0.3em]">Nuclear Burn Session</span>
                        <span class="h-px w-8 bg-slate-800 group-hover:bg-red-900"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const DB_NAME = "Ghost_V7_Elite";
        const DB_VERSION = 2; // Upgraded for history store
        const CHUNK_SIZE = 16384; // 16KB chunks for file transfer
        const REKEY_THRESHOLD = 100; // Rotate keys every 100 messages
        
        // ENHANCED ICE CONFIGURATION WITH TURN SERVERS
        // Using Open Relay Project (public) + Google STUN
        const iceServers = [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun.services.mozilla.com' },
            // Public TURN servers for symmetric NAT traversal
            {
                urls: 'turn:openrelay.metered.ca:80',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            {
                urls: 'turn:openrelay.metered.ca:443',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            },
            {
                urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                username: 'openrelayproject',
                credential: 'openrelayproject'
            }
        ];

        let pc, dataChannel, identityKey, sendChainKey, recvChainKey, storageKey;
        let db;
        let messageCount = 0;
        let ephemeralMode = false; // If true, don't persist identity
        let fileTransfer = { active: false, chunks: [], receivedSize: 0, metadata: null };
        let sessionId = null;

        const bufToHex = b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
        const hexToBuf = h => new Uint8Array(h.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
        const arrayBufferToBase64 = buffer => btoa(String.fromCharCode(...new Uint8Array(buffer)));
        const base64ToArrayBuffer = base64 => {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        };

        function log(msg, color = "text-slate-600") {
            const win = document.getElementById('log-window');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, hour: "numeric", minute: "numeric", second: "numeric" });
            win.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
            win.scrollTop = win.scrollHeight;
        }

        // DATABASE INITIALIZATION WITH HISTORY STORE
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    if (!database.objectStoreNames.contains("keys")) {
                        database.createObjectStore("keys");
                    }
                    if (!database.objectStoreNames.contains("history")) {
                        const historyStore = database.createObjectStore("history", { keyPath: "id", autoIncrement: true });
                        historyStore.createIndex("sessionId", "sessionId", { unique: false });
                        historyStore.createIndex("timestamp", "timestamp", { unique: false });
                    }
                    if (!database.objectStoreNames.contains("config")) {
                        database.createObjectStore("config");
                    }
                    log("DATABASE_SCHEMA_V2_DEPLOYED", "text-cyan-500");
                };
                
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e);
            });
        }

        async function init() {
            try {
                await initDB();
                
                // Load config
                const tx = db.transaction("config", "readonly");
                const store = tx.objectStore("config");
                const modeReq = store.get("ephemeralMode");
                
                modeReq.onsuccess = async () => {
                    ephemeralMode = modeReq.result || false;
                    updateModeBadge();
                    
                    if (!ephemeralMode) {
                        await loadOrCreateIdentity();
                    } else {
                        await rotateIdentity(false); // Generate new ephemeral keys
                    }
                };
            } catch (e) { 
                log("INIT_ERROR: " + e.message, "text-red-500"); 
            }
        }

        async function loadOrCreateIdentity() {
            const tx = db.transaction("keys", "readwrite");
            const store = tx.objectStore("keys");
            const getReq = store.get("idKey");
            
            getReq.onsuccess = async () => {
                if (getReq.result) {
                    identityKey = getReq.result;
                    log("IDENTITY_PERSISTED_LOADED", "text-cyan-500");
                } else {
                    await generateAndStoreIdentity();
                }
                await deriveStorageKey();
                await displayIdentity();
            };
        }

        async function generateAndStoreIdentity() {
            identityKey = await crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" }, 
                true, 
                ["deriveKey"]
            );
            
            if (!ephemeralMode) {
                const tx = db.transaction("keys", "readwrite");
                tx.objectStore("keys").put(identityKey, "idKey");
            }
        }

        async function deriveStorageKey() {
            // Derive storage encryption key from identity private key
            const rawPriv = await crypto.subtle.exportKey("pkcs8", identityKey.privateKey);
            const baseKey = await crypto.subtle.importKey("raw", rawPriv.slice(-32), "HKDF", false, ["deriveKey"]);
            storageKey = await crypto.subtle.deriveKey(
                { name: "HKDF", hash: "SHA-256", salt: new Uint8Array(32), info: new TextEncoder().encode("ghost-storage-v7") },
                baseKey,
                { name: "AES-GCM", length: 256 },
                true,
                ["encrypt", "decrypt"]
            );
        }

        async function displayIdentity() {
            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
            const hex = bufToHex(pub).toUpperCase();
            document.getElementById('my-fingerprint').innerText = hex.match(/.{1,8}/g).join(' ');
            document.getElementById('id-badge').innerText = `ID: ${hex.slice(0,8)}`;
        }

        function toggleEphemeral() {
            ephemeralMode = !ephemeralMode;
            const tx = db.transaction("config", "readwrite");
            tx.objectStore("config").put(ephemeralMode, "ephemeralMode");
            updateModeBadge();
            if (ephemeralMode) {
                rotateIdentity();
                log("MODE_SWITCHED: EPHEMERAL", "text-emerald-500");
            } else {
                log("MODE_SWITCHED: PERSISTENT", "text-cyan-500");
                loadOrCreateIdentity();
            }
        }

        function updateModeBadge() {
            const badge = document.getElementById('mode-badge');
            badge.innerText = ephemeralMode ? "MODE: EPHEMERAL" : "MODE: PERSISTENT";
            badge.className = ephemeralMode 
                ? "text-[8px] bg-red-900/30 text-red-400 border border-red-800 px-2 py-0.5 rounded transition-colors"
                : "text-[8px] bg-cyan-900/30 text-cyan-400 border border-cyan-800 px-2 py-0.5 rounded transition-colors";
        }

        async function rotateIdentity(save = true) {
            await generateAndStoreIdentity();
            await deriveStorageKey();
            await displayIdentity();
            if (save) log("IDENTITY_ROTATED", "text-emerald-500");
        }

        // CRYPTOGRAPHIC FUNCTIONS
        async function ratchet(inputKey, label) {
            const info = new TextEncoder().encode(`ghost-v7-${label}`);
            const master = await crypto.subtle.importKey("raw", inputKey, "HKDF", false, ["deriveKey"]);
            const derived = await crypto.subtle.deriveKey(
                { name: "HKDF", hash: "SHA-256", salt: new Uint8Array(32), info },
                master, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
            );
            return await crypto.subtle.exportKey("raw", derived);
        }

        async function startOffer() {
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            
            loader.classList.remove('hidden');
            btnText.style.opacity = '0';
            log("INIT_ICE_GATHERING...", "text-cyan-400");

            pc = new RTCPeerConnection({ iceServers });
            dataChannel = pc.createDataChannel("chat", { ordered: true, maxRetransmits: 3 });
            setupDC(dataChannel);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // PROPER ICE GATHERING STATE HANDLING
            let gatheringComplete = false;
            
            pc.onicegatheringstatechange = async () => {
                if (pc.iceGatheringState === 'complete' && !gatheringComplete) {
                    gatheringComplete = true;
                    await finalizeOffer();
                }
            };
            
            // Fallback timeout for stubborn networks (10s)
            setTimeout(async () => {
                if (!gatheringComplete) {
                    gatheringComplete = true;
                    log("ICE_FALLBACK_TIMEOUT", "text-yellow-500");
                    await finalizeOffer();
                }
            }, 10000);
        }

        async function finalizeOffer() {
            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
            const token = btoa(JSON.stringify({ 
                sdp: pc.localDescription, 
                key: bufToHex(pub),
                ts: Date.now()
            }));
            
            document.getElementById('sdp-io').value = token;
            document.getElementById('copy-btn').classList.remove('hidden');
            
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('btn-text').style.opacity = '1';
            log("OFFER_READY_COMPLETE", "text-emerald-500");
            
            // Auto-copy to clipboard using modern API
            await copyToClipboard(token);
        }

        async function connect() {
            const raw = document.getElementById('sdp-io').value.trim();
            if(!raw) return;
            
            try {
                const data = JSON.parse(atob(raw));
                if (!pc) {
                    pc = new RTCPeerConnection({ iceServers });
                    pc.ondatachannel = e => setupDC(e.channel);
                }
                
                sessionId = data.ts || Date.now();
                
                const remotePub = await crypto.subtle.importKey("raw", hexToBuf(data.key), { name: "ECDH", namedCurve: "P-256" }, true, []);
                const shared = await crypto.subtle.deriveKey(
                    { name: "ECDH", public: remotePub }, 
                    identityKey.privateKey, 
                    { name: "AES-GCM", length: 256 }, 
                    true, 
                    ["encrypt", "decrypt"]
                );
                const root = await crypto.subtle.exportKey("raw", shared);
                
                const isInitiator = data.sdp.type === "answer";
                sendChainKey = await ratchet(root, isInitiator ? "A" : "B");
                recvChainKey = await ratchet(root, isInitiator ? "B" : "A");

                const hash = await crypto.subtle.digest("SHA-256", root);
                const sn = bufToHex(hash).toUpperCase();
                document.getElementById('safety-number').innerText = `SN: ${sn.slice(0,4)} ${sn.slice(4,8)}`;

                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                
                if (data.sdp.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    
                    // Wait for ICE gathering for answer too
                    pc.onicegatheringstatechange = async () => {
                        if (pc.iceGatheringState === 'complete') {
                            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                            document.getElementById('sdp-io').value = btoa(JSON.stringify({ 
                                sdp: pc.localDescription, 
                                key: bufToHex(pub),
                                ts: sessionId
                            }));
                            log("ANSWER_READY", "text-emerald-500");
                            await copyToClipboard(document.getElementById('sdp-io').value);
                        }
                    };
                    
                    // Fallback for answer
                    setTimeout(async () => {
                        if (pc.iceGatheringState !== 'complete') {
                            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                            document.getElementById('sdp-io').value = btoa(JSON.stringify({ 
                                sdp: pc.localDescription, 
                                key: bufToHex(pub),
                                ts: sessionId
                            }));
                            log("ANSWER_FALLBACK", "text-yellow-500");
                        }
                    }, 8000);
                }
                
                // Load history if available
                if (document.getElementById('history-toggle').checked) {
                    await loadHistory();
                }
                
            } catch(e) { 
                log("CONNECTION_ERROR: " + e.message, "text-red-500"); 
            }
        }

        // CLIPBOARD MODERN API
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                log("COPIED_TO_CLIPBOARD", "text-emerald-500");
                return true;
            } catch (err) {
                // Fallback to deprecated method
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (success) log("COPIED_FALLBACK", "text-yellow-500");
                    return success;
                } catch (e) {
                    document.body.removeChild(textarea);
                    log("COPY_FAILED", "text-red-500");
                    return false;
                }
            }
        }

        function setupDC(dc) {
            dataChannel = dc;
            
            dc.onopen = () => {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('chat-view').classList.remove('hidden');
                document.getElementById('status-led').classList.replace('bg-cyan-500', 'bg-emerald-500');
                document.getElementById('status-text').innerText = "TUNNEL_ESTABLISHED_SECURE";
                setInterval(updatePing, 2000);
                log("SECURE_CHANNEL_OPEN", "text-emerald-500");
            };
            
            dc.onmessage = async (e) => {
                try {
                    const payload = JSON.parse(e.data);
                    
                    // Handle control messages
                    if (payload.type === 'file-chunk') {
                        await handleFileChunk(payload);
                        return;
                    }
                    if (payload.type === 'file-start') {
                        await handleFileStart(payload);
                        return;
                    }
                    if (payload.type === 'file-end') {
                        await handleFileEnd(payload);
                        return;
                    }
                    if (payload.type === 'rekey') {
                        await handleRekey(payload);
                        return;
                    }
                    
                    // Standard text message
                    const key = await crypto.subtle.importKey("raw", recvChainKey, "AES-GCM", false, ["decrypt"]);
                    const dec = await crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: hexToBuf(payload.iv) }, 
                        key, 
                        hexToBuf(payload.m)
                    );
                    const text = new TextDecoder().decode(dec);
                    
                    render(text, 'peer', payload.iv); // Store IV for history
                    recvChainKey = await ratchet(recvChainKey, "step");
                    await rotateKeysIfNeeded();
                    
                } catch (err) { 
                    log("DECRYPTION_FAIL: " + err.message, "text-red-500"); 
                }
            };
            
            dc.onclose = () => {
                log("CHANNEL_CLOSED", "text-red-500");
                document.getElementById('status-text').innerText = "DISCONNECTED";
                document.getElementById('status-led').classList.replace('bg-emerald-500', 'bg-red-500');
            };
        }

        // FILE TRANSFER IMPLEMENTATION
        async function sendFile(file) {
            if (!file || !dataChannel || dataChannel.readyState !== "open") return;
            
            const fileId = bufToHex(crypto.getRandomValues(new Uint8Array(8)));
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            
            // Send metadata
            const metadata = {
                type: 'file-start',
                id: fileId,
                name: file.name,
                size: file.size,
                mime: file.type,
                chunks: totalChunks
            };
            dataChannel.send(JSON.stringify(metadata));
            
            // Show progress UI
            document.getElementById('file-progress').classList.remove('hidden');
            document.getElementById('file-name').innerText = `↑ ${file.name}`;
            
            // Read and send chunks
            const reader = new FileReader();
            let offset = 0;
            let chunkIndex = 0;
            
            reader.onload = async (e) => {
                const chunk = arrayBufferToBase64(e.target.result);
                const packet = {
                    type: 'file-chunk',
                    id: fileId,
                    index: chunkIndex,
                    data: chunk
                };
                
                dataChannel.send(JSON.stringify(packet));
                
                // Update progress
                chunkIndex++;
                const percent = Math.round((chunkIndex / totalChunks) * 100);
                document.getElementById('progress-fill').style.width = `${percent}%`;
                document.getElementById('file-percent').innerText = `${percent}%`;
                
                if (offset < file.size) {
                    readNextChunk();
                } else {
                    // Send completion
                    setTimeout(() => {
                        dataChannel.send(JSON.stringify({ type: 'file-end', id: fileId }));
                        document.getElementById('file-progress').classList.add('hidden');
                        render(`📎 FILE SENT: ${file.name} (${formatBytes(file.size)})`, 'me');
                    }, 100);
                }
            };
            
            function readNextChunk() {
                const slice = file.slice(offset, offset + CHUNK_SIZE);
                reader.readAsArrayBuffer(slice);
                offset += CHUNK_SIZE;
            }
            
            readNextChunk();
        }

        async function handleFileStart(meta) {
            fileTransfer = {
                active: true,
                metadata: meta,
                chunks: new Array(meta.chunks),
                received: 0
            };
            document.getElementById('file-progress').classList.remove('hidden');
            document.getElementById('file-name').innerText = `↓ ${meta.name}`;
            log(`RECEIVING_FILE: ${meta.name}`, "text-cyan-400");
        }

        async function handleFileChunk(packet) {
            if (!fileTransfer.active) return;
            fileTransfer.chunks[packet.index] = packet.data;
            fileTransfer.received++;
            
            const percent = Math.round((fileTransfer.received / fileTransfer.metadata.chunks) * 100);
            document.getElementById('progress-fill').style.width = `${percent}%`;
            document.getElementById('file-percent').innerText = `${percent}%`;
        }

        async function handleFileEnd() {
            if (!fileTransfer.active) return;
            
            // Reconstruct file
            const base64 = fileTransfer.chunks.join('');
            const buffer = base64ToArrayBuffer(base64);
            const blob = new Blob([buffer], { type: fileTransfer.metadata.mime });
            
            // Create download link
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileTransfer.metadata.name;
            link.className = "text-cyan-400 hover:text-cyan-300 underline cursor-pointer";
            link.innerText = `📎 ${fileTransfer.metadata.name} (${formatBytes(fileTransfer.metadata.size)})`;
            
            render(link.outerHTML, 'peer', null, true); // true = allow HTML for the link
            
            document.getElementById('file-progress').classList.add('hidden');
            fileTransfer = { active: false, chunks: [], receivedSize: 0, metadata: null };
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // MESSAGE HISTORY WITH ENCRYPTION
        async function saveMessage(text, side, ivHex) {
            if (!document.getElementById('history-toggle').checked || !db) return;
            
            try {
                const enc = new TextEncoder().encode(text);
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const encrypted = await crypto.subtle.encrypt(
                    { name: "AES-GCM", iv },
                    storageKey,
                    enc
                );
                
                const entry = {
                    sessionId: sessionId || 'unknown',
                    timestamp: Date.now(),
                    ciphertext: bufToHex(encrypted),
                    iv: bufToHex(iv),
                    side: side,
                    msgIv: ivHex || null // Store original message IV for audit
                };
                
                const tx = db.transaction("history", "readwrite");
                tx.objectStore("history").add(entry);
            } catch (e) {
                console.error("History save failed", e);
            }
        }

        async function loadHistory() {
            if (!db || !sessionId) return;
            
            try {
                const tx = db.transaction("history", "readonly");
                const store = tx.objectStore("history");
                const index = store.index("sessionId");
                const request = index.getAll(sessionId);
                
                request.onsuccess = async () => {
                    const messages = request.result;
                    if (messages.length === 0) return;
                    
                    log(`LOADING_HISTORY: ${messages.length} MESSAGES`, "text-cyan-500");
                    
                    for (const msg of messages) {
                        try {
                            const key = await crypto.subtle.importKey("raw", storageKey, "AES-GCM", false, ["decrypt"]);
                            const dec = await crypto.subtle.decrypt(
                                { name: "AES-GCM", iv: hexToBuf(msg.iv) },
                                key,
                                hexToBuf(msg.ciphertext)
                            );
                            const text = new TextDecoder().decode(dec);
                            render(text, msg.side, null, true, true); // true = isHistory, skipAnimation
                        } catch (e) {
                            // Failed to decrypt history (key rotated?)
                        }
                    }
                };
            } catch (e) {
                log("HISTORY_LOAD_FAILED", "text-red-500");
            }
        }

        async function clearHistory() {
            if (!confirm("Purge all encrypted message history?")) return;
            const tx = db.transaction("history", "readwrite");
            tx.objectStore("history").clear();
            log("HISTORY_PURGED", "text-red-500");
        }

        // KEY ROTATION & PERFECT FORWARD SECRECY
        async function rotateKeysIfNeeded() {
            messageCount++;
            document.getElementById('msg-counter').innerText = `MSG: ${messageCount}`;
            
            if (messageCount >= REKEY_THRESHOLD) {
                await triggerRekey();
            }
        }

        async function triggerRekey() {
            if (!dataChannel || dataChannel.readyState !== "open") return;
            
            log("INITIATING_KEY_ROTATION...", "text-cyan-500");
            
            // Generate ephemeral ECDH key pair for session rotation
            const ephemeralKeys = await crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" },
                true,
                ["deriveKey"]
            );
            
            const pubRaw = await crypto.subtle.exportKey("raw", ephemeralKeys.publicKey);
            
            // Send new public key to peer
            dataChannel.send(JSON.stringify({
                type: 'rekey',
                key: bufToHex(pubRaw),
                timestamp: Date.now()
            }));
            
            // Derive new shared secret (simulated - in real scenario peer sends their key back)
            // For this implementation, we rotate the symmetric ratchet aggressively
            sendChainKey = await ratchet(sendChainKey, "rekey-send");
            recvChainKey = await ratchet(recvChainKey, "rekey-recv");
            messageCount = 0;
            
            log("KEYS_ROTATED_SUCCESSFULLY", "text-emerald-500");
        }

        async function handleRekey(payload) {
            log("PROCESSING_PEER_REKEY...", "text-cyan-500");
            // In a full implementation, we'd complete ECDH with the peer's new key
            // For now, we synchronize ratchet steps
            sendChainKey = await ratchet(sendChainKey, "rekey-recv");
            recvChainKey = await ratchet(recvChainKey, "rekey-send");
            messageCount = 0;
            document.getElementById('msg-counter').innerText = `MSG: 0 [ROTATED]`;
            log("REKEY_SYNCHRONIZED", "text-emerald-500");
        }

        // UI FUNCTIONS
        async function updatePing() {
            if (!pc) return;
            const stats = await pc.getStats();
            stats.forEach(r => {
                if (r.type === 'candidate-pair' && r.state === 'succeeded' && r.currentRoundTripTime) {
                    const ms = Math.round(r.currentRoundTripTime * 1000);
                    const el = document.getElementById('ping-val');
                    el.innerText = `LATENCY: ${ms} MS`;
                    el.className = ms > 300 ? "text-[8px] text-yellow-500 mr-1" : "text-[8px] text-slate-600 mr-1";
                }
            });
        }

        function render(txt, side, ivHex = null, allowHTML = false, skipAnimation = false) {
            const clean = allowHTML ? txt : (typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(txt) : txt);
            const d = document.createElement('div');
            d.className = `flex ${side === 'me' ? 'justify-end' : 'justify-start'} ${skipAnimation ? '' : 'mes-in'}`;
            
            const bubbleClass = side === 'me' 
                ? 'bg-cyan-600 text-white rounded-2xl rounded-tr-none shadow-lg shadow-cyan-900/20' 
                : 'bg-slate-800 border border-slate-700 text-slate-200 rounded-2xl rounded-tl-none';
            
            d.innerHTML = `<div class="max-w-[85%] p-3 text-[11px] ${bubbleClass}">${clean}</div>`;
            
            const container = document.getElementById('messages');
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
            
            // Save to encrypted history
            if (!allowHTML) saveMessage(txt, side, ivHex);
        }

        async function transmit() {
            const i = document.getElementById('msg-input');
            if (!i.value || !dataChannel || dataChannel.readyState !== "open") return;
            
            const val = i.value; 
            i.value = '';
            
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await crypto.subtle.importKey("raw", sendChainKey, "AES-GCM", false, ["encrypt"]);
            const enc = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv }, 
                key, 
                new TextEncoder().encode(val)
            );
            
            dataChannel.send(JSON.stringify({ iv: bufToHex(iv), m: bufToHex(enc) }));
            render(val, 'me', bufToHex(iv));
            
            sendChainKey = await ratchet(sendChainKey, "step");
            await rotateKeysIfNeeded();
        }

        async function nuclearBurn() {
            if (confirm("⚠️ THIS WILL PERMANENTLY ERASE YOUR IDENTITY, HISTORY, AND SESSION.\n\nProceed with nuclear burn?")) {
                document.getElementById('main-container').classList.add('burn-flash');
                if (pc) pc.close();
                
                // Wipe all storage
                indexedDB.deleteDatabase(DB_NAME);
                localStorage.clear();
                sessionStorage.clear();
                
                // Clear crypto keys from memory
                identityKey = null;
                sendChainKey = null;
                recvChainKey = null;
                storageKey = null;
                
                setTimeout(() => location.reload(), 600);
            }
        }

        // EVENT LISTENERS
        document.getElementById('send-btn').onclick = transmit;
        document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') transmit(); };
        document.getElementById('create-btn').onclick = startOffer;
        document.getElementById('connect-btn').onclick = connect;
        document.getElementById('copy-btn').onclick = () => {
            const area = document.getElementById('sdp-io');
            copyToClipboard(area.value);
            const btn = document.getElementById('copy-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => btn.innerText = "COPY TOKEN", 2000);
        };

        // INIT
        init();
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Chat: Secure P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .burn-effect { filter: grayscale(1) blur(10px); opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 transition-all duration-1000" id="body-main">

    <div id="main-container" class="max-w-lg w-full glass rounded-3xl p-8 shadow-2xl transition-all duration-500">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">GHOST-CHAT v3</h1>
            <div id="status-tag" class="text-[10px] mt-2 inline-block px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-widest font-bold">Initializing Keys...</div>
        </header>

        <div id="step-1" class="space-y-4">
            <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl mb-4">
                <p class="text-[11px] text-blue-400 leading-relaxed">
                    <strong>Privacy Protocol:</strong>VPN is recommended to mask Public IP. Both users must verify the <b>Shared ID</b> matches before chatting.
                </p>
            </div>
            
            <button id="create-btn" class="w-full bg-slate-800 hover:bg-slate-700 p-4 rounded-xl text-sm font-semibold border border-slate-600 transition-all text-white">1. Generate Clean Token</button>
            <textarea id="sdp-io" class="w-full bg-black/50 border border-slate-800 rounded-xl p-4 text-[10px] h-32 font-mono focus:border-cyan-500 outline-none text-cyan-400" placeholder="Paste partner's token here..."></textarea>
            <button id="connect-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold shadow-lg shadow-blue-900/20 text-white">2. Finalize Connection</button>
        </div>

        <div id="step-2" class="hidden flex flex-col h-[550px]">
            <button id="burn-btn" class="w-full mb-4 bg-red-950/20 hover:bg-red-600 border border-red-900/50 text-red-500 hover:text-white text-[10px] py-2 rounded-xl font-bold transition-all uppercase tracking-[0.2em]">Burn Session (Wipe RAM)</button>

            <div class="flex flex-col mb-4 pb-3 border-b border-slate-800 space-y-2">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">● Secure Link Active</span>
                    <span id="fingerprint" class="text-[10px] text-white font-mono bg-emerald-500/20 px-3 py-1 rounded-lg border border-emerald-500/30">SHARED ID: ----</span>
                </div>
                <div class="flex justify-between text-[9px] text-slate-500 font-mono italic px-1">
                    <span id="my-id">My Key: ...</span>
                    <span id="peer-id">Peer Key: ...</span>
                </div>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2"></div>

            <div class="flex gap-2 p-2 bg-slate-900 rounded-2xl border border-slate-800 focus-within:border-cyan-500 transition-colors">
                <input id="msg-input" type="text" class="flex-1 bg-transparent px-2 outline-none text-sm text-white" placeholder="Type encrypted message...">
                <button id="send-btn" class="bg-cyan-600 hover:bg-cyan-500 p-2 px-6 rounded-xl font-bold text-white transition-colors text-sm">Send</button>
            </div>
        </div>
    </div>

    <script>
        let pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let dataChannel;
        let localKeyPair;
        let sharedSecretKey;

        // --- 1. CRYPTO ENGINE ---
        async function initCrypto() {
            localKeyPair = await window.crypto.subtle.generateKey(
                { name: "ECDH", namedCurve: "P-256" },
                false, ["deriveKey"]
            );
            document.getElementById('status-tag').innerText = "Keys Ready";
        }

        async function createSharedFingerprint(remotePubKeyBuffer) {
            const localPubKeyBuffer = await crypto.subtle.exportKey("raw", localKeyPair.publicKey);
            const toHex = (buf, len=4) => Array.from(new Uint8Array(buf)).slice(0, len).map(b => b.toString(16).padStart(2, '0')).join(':').toUpperCase();
            
            document.getElementById('my-id').innerText = `Me: ${toHex(localPubKeyBuffer)}`;
            document.getElementById('peer-id').innerText = `Peer: ${toHex(remotePubKeyBuffer)}`;

            const keys = [new Uint8Array(localPubKeyBuffer), new Uint8Array(remotePubKeyBuffer)];
            keys.sort((a, b) => {
                for (let i = 0; i < a.length; i++) {
                    if (a[i] !== b[i]) return a[i] - b[i];
                }
                return 0;
            });

            const combined = new Uint8Array(keys[0].length + keys[1].length);
            combined.set(keys[0], 0); combined.set(keys[1], keys[0].length);
            const hash = await crypto.subtle.digest("SHA-256", combined);
            document.getElementById('fingerprint').innerText = `SHARED ID: ${toHex(hash, 8)}`;
        }

        async function deriveKey(remotePublicKeyBuffer) {
            const remotePublicKey = await window.crypto.subtle.importKey("raw", remotePublicKeyBuffer, { name: "ECDH", namedCurve: "P-256" }, true, []);
            sharedSecretKey = await window.crypto.subtle.deriveKey({ name: "ECDH", public: remotePublicKey }, localKeyPair.privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            await createSharedFingerprint(remotePublicKeyBuffer);
        }

        // --- 2. HANDSHAKE WITH IP SCRUBBER ---
        document.getElementById('create-btn').onclick = async () => {
            dataChannel = pc.createDataChannel("secure-chat");
            setupDC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            pc.onicecandidate = async (e) => {
                if (!e.candidate) {
                    let sdp = pc.localDescription.sdp;
                    // Scrub Local IPs (192.168, 10., 172.16, etc)
                    const localIPRegex = /a=candidate:.*?\s(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|169\.254\.|fe80:).*?\s/g;
                    sdp = sdp.replace(localIPRegex, "");
                    
                    const pubKey = await crypto.subtle.exportKey("raw", localKeyPair.publicKey);
                    const payload = { sdp: { type: pc.localDescription.type, sdp: sdp }, key: Array.from(new Uint8Array(pubKey)) };
                    document.getElementById('sdp-io').value = btoa(JSON.stringify(payload));
                    document.getElementById('create-btn').innerText = "Clean Token Ready ↓";
                }
            };
        };

        document.getElementById('connect-btn').onclick = async () => {
            try {
                const val = document.getElementById('sdp-io').value.trim();
                const raw = JSON.parse(atob(val));
                await pc.setRemoteDescription(new RTCSessionDescription(raw.sdp));
                await deriveKey(new Uint8Array(raw.key).buffer);

                if (raw.sdp.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    pc.onicecandidate = async (e) => {
                        if (!e.candidate) {
                            const pubKey = await crypto.subtle.exportKey("raw", localKeyPair.publicKey);
                            const payload = { sdp: pc.localDescription, key: Array.from(new Uint8Array(pubKey)) };
                            document.getElementById('sdp-io').value = btoa(JSON.stringify(payload));
                        }
                    };
                }
            } catch (e) { alert("Invalid Token!"); }
        };

        pc.ondatachannel = (e) => { dataChannel = e.channel; setupDC(); };

        function setupDC() {
            dataChannel.onopen = () => {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            };
            dataChannel.onmessage = async (e) => {
                try {
                    const { iv, data } = JSON.parse(e.data);
                    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(iv) }, sharedSecretKey, new Uint8Array(data));
                    renderMsg(new TextDecoder().decode(plain), 'partner');
                } catch (err) { console.error("Decryption error"); }
            };
        }

        // --- 3. UI HELPERS ---
        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value || !dataChannel || dataChannel.readyState !== 'open') return;
            const text = input.value;
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, sharedSecretKey, new TextEncoder().encode(text));
            dataChannel.send(JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) }));
            renderMsg(text, 'me');
            input.value = '';
        };

        function renderMsg(msg, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'me' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[85%] p-3 rounded-2xl text-sm ${sender === 'me' ? 'bg-blue-600 rounded-tr-none' : 'bg-slate-800 rounded-tl-none border border-slate-700'}">${msg}</div>`;
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // --- 4. THE NUCLEAR OPTION ---
        document.getElementById('burn-btn').onclick = () => {
            if(confirm("DANGER: Wiping RAM keys and chat history. This is permanent.")) {
                document.getElementById('body-main').classList.add('burn-effect');
                setTimeout(() => {
                    sharedSecretKey = null;
                    localKeyPair = null;
                    location.reload();
                }, 800);
            }
        };

        initCrypto();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Chat v5.0 | Hardened P2P</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; connect-src 'self' wss: stun: turn:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .safety-number { letter-spacing: 2px; font-weight: bold; color: #22d3ee; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="max-w-xl w-full glass rounded-3xl p-8 shadow-2xl transition-all">
        <header class="mb-6 border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black tracking-tighter text-white">GHOST-CHAT <span class="text-cyan-500">v5.0</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">End-to-End Hardened / Serverless</p>
        </header>

        <div id="setup-view" class="space-y-6">
            <div class="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-emerald-400">YOUR PERMANENT IDENTITY</span>
                    <span id="id-status" class="text-[9px] text-slate-500">Loading ID...</span>
                </div>
                <div id="my-fingerprint" class="font-mono text-xs text-center break-all text-slate-300">----</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button id="create-btn" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-xl text-xs font-bold border border-slate-600 transition-all">
                    1. INITIATE (OFFER)
                </button>
                <button id="answer-mode-btn" onclick="document.getElementById('sdp-io').placeholder='Paste Offer here...'" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-xl text-xs font-bold border border-slate-600 transition-all">
                    1. RESPOND (ANSWER)
                </button>
            </div>

            <textarea id="sdp-io" class="w-full bg-black/50 border border-slate-800 rounded-xl p-4 text-[10px] h-24 font-mono focus:border-cyan-500 outline-none text-cyan-400" placeholder="Paste handshake token..."></textarea>
            
            <button id="connect-btn" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-xl font-bold text-white shadow-lg transition-all">
                2. VERIFY & CONNECT
            </button>

            <div id="log-window" class="h-12 overflow-y-auto text-[9px] text-slate-500 font-mono border-t border-slate-800 pt-2">
                > Initializing secure subsystems...
            </div>
        </div>

        <div id="chat-view" class="hidden flex flex-col h-[600px]">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-800">
                <div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <span class="text-xs font-bold text-white">SECURE LINK</span>
                    </div>
                    <span id="ping" class="text-[9px] text-slate-500">Ping: --ms</span>
                </div>
                <div class="text-right">
                    <div id="safety-verify" class="text-[10px] safety-number">ID: 0000-0000</div>
                    <div class="text-[8px] text-slate-500">VERIFY VIA VOICE</div>
                </div>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2"></div>

            <div class="flex gap-2 p-2 bg-slate-900 rounded-2xl border border-slate-800 focus-within:border-cyan-500">
                <input id="msg-input" type="text" class="flex-1 bg-transparent px-2 outline-none text-sm text-white" placeholder="Secret message...">
                <button id="send-btn" class="bg-cyan-600 p-2 px-6 rounded-xl font-bold text-white text-sm">SEND</button>
            </div>
            <button class="mt-4 text-[9px] text-slate-600 hover:text-red-500 uppercase font-black tracking-tighter" onclick="location.reload()">Kill Session & Burn Keys</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // For production, replace stun.l.google.com with your own TURN server for IP hiding.
        const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
        
        // --- CORE STATE ---
        let pc, dataChannel;
        let identityKey, ephemeralKey; 
        let sendChainKey, recvChainKey;
        let msgCounter = 0;

        // --- CRYPTO UTILS ---
        const bufToHex = b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
        const hexToBuf = h => new Uint8Array(h.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

        async function log(msg, color = "text-slate-500") {
            const win = document.getElementById('log-window');
            win.innerHTML += `<div class="${color}">> ${msg}</div>`;
            win.scrollTop = win.scrollHeight;
        }

        // --- STEP 1: PERSISTENT IDENTITY (IndexedDB) ---
        async function getIdentity() {
            return new Promise((resolve) => {
                const request = indexedDB.open("GhostIdentity", 1);
                request.onupgradeneeded = (e) => e.target.result.createObjectStore("keys");
                request.onsuccess = (e) => {
                    const db = e.target.result;
                    const tx = db.transaction("keys", "readwrite");
                    const store = tx.objectStore("keys");
                    const getReq = store.get("idKey");

                    getReq.onsuccess = async () => {
                        if (getReq.result) {
                            resolve(getReq.result);
                        } else {
                            const newKey = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
                            store.put(newKey, "idKey");
                            resolve(newKey);
                        }
                    };
                };
            });
        }

        // --- STEP 2: DOUBLE RATCHET KDF ---
        async function ratchet(inputKey, label) {
            const info = new TextEncoder().encode(`ghost-v5-${label}`);
            const salt = new Uint8Array(32); // In full production, this would change per DH ratchet
            const master = await crypto.subtle.importKey("raw", inputKey, { name: "HKDF" }, false, ["deriveKey"]);
            const derived = await crypto.subtle.deriveKey(
                { name: "HKDF", hash: "SHA-256", salt, info },
                master,
                { name: "AES-GCM", length: 256 },
                true, ["encrypt", "decrypt"]
            );
            return await crypto.subtle.exportKey("raw", derived);
        }

        // --- STEP 3: HANDSHAKE LOGIC ---
        async function init() {
            identityKey = await getIdentity();
            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
            document.getElementById('my-fingerprint').innerText = bufToHex(pub).match(/.{1,8}/g).join(' ');
            document.getElementById('id-status').innerText = "Identity Loaded";
        }

        async function createOffer() {
            pc = new RTCPeerConnection(iceConfig);
            dataChannel = pc.createDataChannel("hardened-chat");
            setupDC(dataChannel);

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            pc.onicecandidate = async (e) => {
                if (!e.candidate) {
                    const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                    const token = btoa(JSON.stringify({ sdp: pc.localDescription, key: bufToHex(pub) }));
                    document.getElementById('sdp-io').value = token;
                    log("Offer Token Ready. Send to peer.", "text-cyan-400");
                }
            };
        }

        async function setupConnection() {
            const rawToken = document.getElementById('sdp-io').value.trim();
            if (!rawToken) return;
            const data = JSON.parse(atob(rawToken));

            if (!pc) pc = new RTCPeerConnection(iceConfig);
            
            // Derive Shared Secret
            const remotePub = await crypto.subtle.importKey("raw", hexToBuf(data.key), { name: "ECDH", namedCurve: "P-256" }, true, []);
            const sharedSecret = await crypto.subtle.deriveKey(
                { name: "ECDH", public: remotePub },
                identityKey.privateKey,
                { name: "AES-GCM", length: 256 },
                true, ["encrypt", "decrypt"]
            );
            
            const root = await crypto.subtle.exportKey("raw", sharedSecret);
            const isInitiator = data.sdp.type === "answer";
            
            // Set Ratchets (Differentiated Chains)
            sendChainKey = await ratchet(root, isInitiator ? "A" : "B");
            recvChainKey = await ratchet(root, isInitiator ? "B" : "A");

            // Safety Number Verification
            const fingerprint = await crypto.subtle.digest("SHA-256", root);
            const fingerHex = bufToHex(fingerprint).toUpperCase();
            document.getElementById('safety-verify').innerText = `ID: ${fingerHex.slice(0,4)}-${fingerHex.slice(4,8)}`;

            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

            if (data.sdp.type === "offer") {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                pc.onicecandidate = async (e) => {
                    if (!e.candidate) {
                        const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                        document.getElementById('sdp-io').value = btoa(JSON.stringify({ sdp: pc.localDescription, key: bufToHex(pub) }));
                        log("Answer generated. Send back to initiator.", "text-emerald-400");
                    }
                };
            }
        }

        function setupDC(dc) {
            dataChannel = dc;
            dataChannel.onopen = () => {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('chat-view').classList.remove('hidden');
            };
            dataChannel.onmessage = async (e) => {
                const payload = JSON.parse(e.data);
                const key = await crypto.subtle.importKey("raw", recvChainKey, "AES-GCM", false, ["decrypt"]);
                try {
                    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: hexToBuf(payload.iv) }, key, hexToBuf(payload.msg));
                    const text = new TextDecoder().decode(decrypted);
                    render(text, 'peer');
                    // Step the Ratchet
                    recvChainKey = await ratchet(recvChainKey, "step");
                } catch (err) { log("Decryption Error: Key Desync", "text-red-500"); }
            };
        }

        // --- STEP 5: XSS DEFENSE & RENDERING ---
        function render(text, side) {
            const clean = DOMPurify.sanitize(text); // Prevent XSS
            const div = document.createElement('div');
            div.className = `flex ${side === 'me' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[80%] p-3 rounded-2xl text-sm ${side === 'me' ? 'bg-cyan-600' : 'bg-slate-800'}">${clean}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value || dataChannel.readyState !== "open") return;

            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await crypto.subtle.importKey("raw", sendChainKey, "AES-GCM", false, ["encrypt"]);
            const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(input.value));

            dataChannel.send(JSON.stringify({
                iv: bufToHex(iv),
                msg: bufToHex(encrypted),
                seq: msgCounter++
            }));

            render(input.value, 'me');
            input.value = '';
            // Step the Ratchet
            sendChainKey = await ratchet(sendChainKey, "step");
        };

        // --- INIT CALLS ---
        document.getElementById('create-btn').onclick = createOffer;
        document.getElementById('connect-btn').onclick = setupConnection;
        pc = new RTCPeerConnection(iceConfig);
        pc.ondatachannel = (e) => setupDC(e.channel);
        
        init();
    </script>
</body>
</html>

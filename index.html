<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Chat: Hardened P2P v3.6.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none; }
        .log-line { font-family: monospace; font-size: 9px; border-left: 2px solid #334155; padding-left: 6px; margin-bottom: 2px; }
        
        /* Loading Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #22d3ee;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4 transition-all duration-1000" id="body-main">

    <div id="main-container" class="max-w-lg w-full glass rounded-3xl p-8 shadow-2xl transition-all duration-500">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">GHOST-CHAT v3.6.2</h1>
            <div id="status-tag" class="text-[10px] mt-2 inline-block px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-widest font-bold border border-slate-700">Encrypted P2P</div>
        </header>

        <div id="step-1" class="space-y-4">
            <div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl mb-4">
                <p class="text-[11px] text-blue-400 leading-relaxed">
                    <strong>Handshake:</strong> Generate token -> Send to peer. Peer pastes & sends Answer back.
                </p>
            </div>

            <button id="create-btn" class="w-full bg-slate-800 hover:bg-slate-700 p-4 rounded-xl text-sm font-semibold border border-slate-600 transition-all text-white flex items-center justify-center">
                <span id="btn-spinner" class="spinner hidden"></span>
                <span id="btn-text">1. Generate Secure Token</span>
            </button>
            
            <div class="relative">
                <textarea id="sdp-io" class="w-full bg-black/50 border border-slate-800 rounded-xl p-4 text-[10px] h-32 font-mono focus:border-cyan-500 outline-none text-cyan-400" placeholder="Paste partner's token..."></textarea>
                <button id="copy-btn" class="absolute bottom-2 right-2 bg-cyan-600 px-3 py-1 rounded text-[10px] text-white font-bold hidden">COPY</button>
            </div>
            
            <button id="connect-btn" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold text-white transition-all">2. Verify & Connect</button>

            <div class="p-3 bg-black/40 rounded-xl border border-slate-800">
                <div id="log-window" class="h-16 overflow-y-auto text-slate-400 scrollbar-hide text-[9px]">
                    <div class="log-line text-cyan-500">Awaiting secure handshake...</div>
                </div>
            </div>
        </div>

        <div id="step-2" class="hidden flex flex-col h-[550px]">
            <div class="flex flex-col mb-4 pb-3 border-b border-slate-800 space-y-2">
                <div class="flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Secure Link
                        </span>
                        <span id="latency-val" class="text-[9px] text-slate-500 font-mono">Ping: --ms</span>
                    </div>
                    <span id="fingerprint" class="text-[10px] text-white font-mono bg-emerald-500/20 px-3 py-1 rounded-lg border border-emerald-500/30">ID: ----</span>
                </div>
            </div>
            <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2"></div>
            <div class="flex gap-2 p-2 bg-slate-900 rounded-2xl border border-slate-800 focus-within:border-cyan-500">
                <input id="msg-input" type="text" class="flex-1 bg-transparent px-2 outline-none text-sm text-white" placeholder="Message...">
                <button id="send-btn" class="bg-cyan-600 p-2 px-6 rounded-xl font-bold text-white text-sm">Send</button>
            </div>
            <button id="burn-btn" class="mt-4 text-slate-600 hover:text-red-500 text-[9px] uppercase font-bold transition-all text-center" onclick="location.reload()">Burn Session</button>
        </div>
    </div>

    <script>
        const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }] };
        let pc = new RTCPeerConnection(iceConfig);
        let dataChannel, localKeyPair, sharedSecretKey, isTokenGenerated = false;

        function logger(msg, type = 'info') {
            const logWin = document.getElementById('log-window');
            const line = document.createElement('div');
            line.className = `log-line ${type === 'error' ? 'text-red-400' : type === 'success' ? 'text-emerald-400' : 'text-slate-400'}`;
            line.innerText = `> ${msg}`;
            logWin.appendChild(line);
            logWin.scrollTop = logWin.scrollHeight;
        }

        async function generateIntegrityToken(payloadObj) {
            const encoder = new TextEncoder();
            const data = encoder.encode(JSON.stringify(payloadObj));
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            return btoa(JSON.stringify({ ...payloadObj, _sig: hashHex }));
        }

        async function verifyIntegrityToken(base64Str) {
            const raw = JSON.parse(atob(base64Str));
            const signature = raw._sig; delete raw._sig;
            const data = new TextEncoder().encode(JSON.stringify(raw));
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const currentHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            if (currentHash !== signature) throw new Error("Integrity Fail");
            return raw;
        }

        async function initCrypto() {
            localKeyPair = await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, false, ["deriveKey"]);
        }

        async function deriveKey(remotePublicKeyBuffer) {
            const remotePublicKey = await window.crypto.subtle.importKey("raw", remotePublicKeyBuffer, { name: "ECDH", namedCurve: "P-256" }, true, []);
            sharedSecretKey = await window.crypto.subtle.deriveKey({ name: "ECDH", public: remotePublicKey }, localKeyPair.privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            const localPubKey = await crypto.subtle.exportKey("raw", localKeyPair.publicKey);
            const combined = new Uint8Array([...new Uint8Array(localPubKey), ...new Uint8Array(remotePublicKeyBuffer)].sort());
            const hash = await crypto.subtle.digest("SHA-256", combined);
            document.getElementById('fingerprint').innerText = `ID: ${Array.from(new Uint8Array(hash)).slice(0,4).map(b => b.toString(16).toUpperCase()).join(':')}`;
        }

        const finalizeSDP = async () => {
            if (isTokenGenerated) return;
            isTokenGenerated = true;
            const pubKey = await crypto.subtle.exportKey("raw", localKeyPair.publicKey);
            const payload = { sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp }, key: Array.from(new Uint8Array(pubKey)) };
            document.getElementById('sdp-io').value = await generateIntegrityToken(payload);
            
            // Hide Spinner
            document.getElementById('btn-spinner').classList.add('hidden');
            document.getElementById('btn-text').innerText = "TOKEN READY";
            document.getElementById('copy-btn').classList.remove('hidden');
            logger("Routes gathered.", "success");
        };

        document.getElementById('create-btn').onclick = async () => {
            document.getElementById('btn-spinner').classList.remove('hidden');
            document.getElementById('btn-text').innerText = "Gathering...";
            dataChannel = pc.createDataChannel("chat");
            setupDC(dataChannel);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            pc.onicecandidate = (e) => { if (!e.candidate) finalizeSDP(); };
            setTimeout(finalizeSDP, 7000); 
        };

        document.getElementById('connect-btn').onclick = async () => {
            try {
                const raw = await verifyIntegrityToken(document.getElementById('sdp-io').value.trim());
                await pc.setRemoteDescription(new RTCSessionDescription(raw.sdp));
                await deriveKey(new Uint8Array(raw.key).buffer);
                if (raw.sdp.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    pc.onicecandidate = (e) => { if (!e.candidate) finalizeSDP(); };
                    setTimeout(finalizeSDP, 7000);
                }
            } catch (e) { logger("Token Invalid", "error"); }
        };

        pc.ondatachannel = (e) => setupDC(e.channel);

        function setupDC(channel) {
            dataChannel = channel;
            dataChannel.onopen = () => {
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
                setInterval(updateStats, 2000); // Start Latency Monitor
            };
            dataChannel.onmessage = async (e) => {
                const { iv, data } = JSON.parse(e.data);
                const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(iv) }, sharedSecretKey, new Uint8Array(data));
                renderMsg(new TextDecoder().decode(plain), 'partner');
            };
        }

        async function updateStats() {
            const stats = await pc.getStats();
            stats.forEach(report => {
                if (report.type === 'remote-candidate' || report.type === 'candidate-pair') {
                    if (report.currentRoundTripTime) {
                        const ms = Math.round(report.currentRoundTripTime * 1000);
                        const el = document.getElementById('latency-val');
                        el.innerText = `Ping: ${ms}ms`;
                        el.className = ms < 150 ? "text-emerald-500 font-mono text-[9px]" : "text-orange-400 font-mono text-[9px]";
                    }
                }
            });
        }

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const enc = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, sharedSecretKey, new TextEncoder().encode(input.value));
            dataChannel.send(JSON.stringify({ iv: Array.from(iv), data: Array.from(new Uint8Array(enc)) }));
            renderMsg(input.value, 'me');
            input.value = '';
        };

        function renderMsg(msg, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'me' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="max-w-[85%] p-3 rounded-2xl text-sm ${sender === 'me' ? 'bg-blue-600' : 'bg-slate-800'}">${msg}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('sdp-io').value);
            document.getElementById('copy-btn').innerText = "DONE";
        };
        initCrypto();
    </script>
</body>
</html>

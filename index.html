<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Chat v7.0 | Elite Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #06b6d4; }
        body { background: radial-gradient(circle at top left, #0f172a, #020617); font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .glass-pro { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glow-border { position: relative; border-radius: 1.5rem; background: rgba(15, 23, 42, 0.9); }
        .glow-border::before { content: ""; position: absolute; inset: -1px; background: linear-gradient(45deg, #0ea5e9, transparent, #10b981, transparent); border-radius: 1.5rem; z-index: -1; animation: rotate 6s linear infinite; opacity: 0.5; }
        @keyframes rotate { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        .mes-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #qr-gen-canvas img { margin: 0 auto; border: 12px solid white; border-radius: 0.5rem; }
        #qr-reader { border: none !important; }
        #qr-reader__dashboard_section_csr button { background: #06b6d4 !important; color: white !important; border-radius: 8px !important; padding: 4px 10px !important; font-size: 10px !important; text-transform: uppercase !important; font-weight: bold !important; }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="max-w-xl w-full glow-border glass-pro p-1 shadow-2xl transition-all duration-700">
        <div class="bg-[#020617]/90 rounded-[1.4rem] p-8">
            <header class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter text-white italic">GHOST<span class="text-cyan-500 not-italic">V7.0</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="status-led" class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_#06b6d4]"></span>
                        <p id="status-text" class="text-[9px] text-slate-500 uppercase font-bold tracking-[0.3em]">Hardware Crypto Ready</p>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <div id="id-badge" class="bg-cyan-500/10 border border-cyan-500/30 px-3 py-1 rounded-full text-[10px] text-cyan-400 font-bold">ID: --</div>
                    <span id="ping-val" class="text-[8px] text-slate-600 mt-1 mr-1 uppercase">Latency: -- ms</span>
                </div>
            </header>

            <div id="setup-view" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <button id="create-btn" class="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-[10px] font-black tracking-widest text-white border border-slate-700 transition-all">GENERATE OFFER</button>
                    <button id="scan-btn" onclick="startScanner()" class="bg-cyan-600 hover:bg-cyan-500 p-4 rounded-2xl text-[10px] font-black tracking-widest text-white shadow-[0_0_15px_rgba(6,182,212,0.3)]">SCAN QR CODE</button>
                </div>

                <div id="scanner-container" class="hidden flex flex-col items-center bg-black/60 p-4 rounded-2xl border border-slate-800">
                    <div id="qr-reader" class="w-full max-w-sm overflow-hidden rounded-xl"></div>
                    <button onclick="stopScanner()" class="mt-4 text-[10px] font-bold text-red-500 uppercase">Cancel Scanning</button>
                </div>

                <div id="qr-display-container" class="hidden text-center p-6 bg-white/5 rounded-2xl border border-slate-800">
                    <div id="qr-gen-canvas" class="mb-4 inline-block"></div>
                    <p class="text-[9px] font-black text-cyan-400 uppercase tracking-widest">Share this with partner</p>
                    <button onclick="document.getElementById('qr-display-container').classList.add('hidden')" class="mt-2 text-[8px] text-slate-500">HIDE QR</button>
                </div>

                <div class="relative">
                    <textarea id="sdp-io" class="w-full bg-black/40 border border-slate-800 rounded-2xl p-4 text-[10px] h-24 font-mono outline-none text-cyan-400 focus:border-cyan-500 transition-all" placeholder="Manual token input..."></textarea>
                </div>
                
                <button id="connect-btn" onclick="connect()" class="w-full bg-slate-800 hover:bg-emerald-600 p-4 rounded-2xl font-black text-[11px] text-white transition-all">INITIALIZE TUNNEL</button>

                <div id="log-window" class="h-12 overflow-y-auto text-[8px] text-slate-600 uppercase font-bold space-y-1"></div>
            </div>

            <div id="chat-view" class="hidden flex flex-col h-[550px]">
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-slate-800/50">
                    <div>
                        <span class="text-[8px] text-slate-500 font-bold tracking-widest">SECURITY</span>
                        <div class="text-[10px] text-emerald-400 font-black">E2E_ENCRYPTED</div>
                    </div>
                    <div id="safety-number" class="text-[10px] text-cyan-400 font-black tracking-widest bg-cyan-500/10 px-3 py-1.5 rounded-lg">SN: ---- ----</div>
                </div>
                <div id="messages" class="flex-1 overflow-y-auto space-y-4 mb-6 pr-2"></div>
                <div class="flex gap-2 p-1.5 bg-slate-900/80 rounded-2xl border border-slate-800">
                    <input id="msg-input" type="text" class="flex-1 bg-transparent px-4 outline-none text-xs text-white" placeholder="Type message...">
                    <button id="send-btn" class="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] hover:bg-cyan-500 hover:text-white uppercase transition-all">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = "Ghost_v7";
        const iceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
        let pc, dataChannel, identityKey, sendChainKey, recvChainKey, scanner;

        const hex = b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
        const unhex = h => new Uint8Array(h.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

        function log(msg, color = "text-slate-600") {
            const win = document.getElementById('log-window');
            win.innerHTML += `<div class="${color}">[LOG] ${msg}</div>`;
            win.scrollTop = win.scrollHeight;
        }

        async function init() {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => e.target.result.createObjectStore("keys");
            request.onsuccess = e => {
                const db = e.target.result;
                const store = db.transaction("keys", "readwrite").objectStore("keys");
                const getReq = store.get("idKey");
                getReq.onsuccess = async () => {
                    if (getReq.result) identityKey = getReq.result;
                    else {
                        identityKey = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
                        store.put(identityKey, "idKey");
                    }
                    const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                    document.getElementById('id-badge').innerText = `ID: ${hex(pub).slice(0,8).toUpperCase()}`;
                };
            };
        }

        async function startOffer() {
            pc = new RTCPeerConnection({ iceServers });
            dataChannel = pc.createDataChannel("chat");
            setupDC(dataChannel);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            pc.onicecandidate = async e => {
                if (!e.candidate) {
                    const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                    const token = JSON.stringify({ sdp: pc.localDescription, key: hex(pub) });
                    const compressed = LZString.compressToEncodedURIComponent(token);
                    document.getElementById('sdp-io').value = compressed;
                    genQR(compressed);
                    log("OFFER_COMPRESSED_READY", "text-emerald-500");
                }
            };
        }

        function genQR(data) {
            document.getElementById('qr-display-container').classList.remove('hidden');
            const canvas = document.getElementById('qr-gen-canvas');
            canvas.innerHTML = "";
            new QRCode(canvas, { text: data, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.L });
        }

        function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            scanner = new Html5Qrcode("qr-reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                document.getElementById('sdp-io').value = text;
                log("SCAN_SUCCESS", "text-cyan-400");
                stopScanner();
                connect();
            }).catch(e => log("CAMERA_ERROR", "text-red-500"));
        }

        function stopScanner() {
            if (scanner) scanner.stop().then(() => document.getElementById('scanner-container').classList.add('hidden'));
        }

        async function connect() {
            let raw = document.getElementById('sdp-io').value.trim();
            if(!raw) return;
            try {
                // Check if it's compressed or raw JSON
                if (raw.startsWith('{')) { /* raw json */ } 
                else { raw = LZString.decompressFromEncodedURIComponent(raw); }
                
                const data = JSON.parse(raw);
                if (!pc) {
                    pc = new RTCPeerConnection({ iceServers });
                    pc.ondatachannel = e => setupDC(e.channel);
                }
                const remotePub = await crypto.subtle.importKey("raw", unhex(data.key), { name: "ECDH", namedCurve: "P-256" }, true, []);
                const shared = await crypto.subtle.deriveKey({ name: "ECDH", public: remotePub }, identityKey.privateKey, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
                const root = await crypto.subtle.exportKey("raw", shared);
                
                const isInitiator = data.sdp.type === "answer";
                sendChainKey = await ratchet(root, isInitiator ? "A" : "B");
                recvChainKey = await ratchet(root, isInitiator ? "B" : "A");

                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                if (data.sdp.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    pc.onicecandidate = async e => {
                        if (!e.candidate) {
                            const pub = await crypto.subtle.exportKey("raw", identityKey.publicKey);
                            const resToken = JSON.stringify({ sdp: pc.localDescription, key: hex(pub) });
                            const comp = LZString.compressToEncodedURIComponent(resToken);
                            document.getElementById('sdp-io').value = comp;
                            genQR(comp);
                            log("ANSWER_READY", "text-emerald-500");
                        }
                    };
                }
            } catch(e) { log("TOKEN_INVALID", "text-red-400"); }
        }

        async function ratchet(inputKey, label) {
            const master = await crypto.subtle.importKey("raw", inputKey, "HKDF", false, ["deriveKey"]);
            const derived = await crypto.subtle.deriveKey(
                { name: "HKDF", hash: "SHA-256", salt: new Uint8Array(32), info: new TextEncoder().encode(label) },
                master, { name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]
            );
            return await crypto.subtle.exportKey("raw", derived);
        }

        function setupDC(dc) {
            dataChannel = dc;
            dataChannel.onopen = () => {
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('chat-view').classList.remove('hidden');
                document.getElementById('status-led').classList.replace('bg-cyan-500', 'bg-emerald-500');
                setInterval(updatePing, 2000);
            };
            dataChannel.onmessage = async e => {
                const p = JSON.parse(e.data);
                const key = await crypto.subtle.importKey("raw", recvChainKey, "AES-GCM", false, ["decrypt"]);
                const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: unhex(p.iv) }, key, unhex(p.m));
                render(new TextDecoder().decode(dec), 'peer');
                recvChainKey = await ratchet(recvChainKey, "step");
            };
        }

        async function updatePing() {
            if (!pc) return;
            const stats = await pc.getStats();
            stats.forEach(r => {
                if (r.type === 'candidate-pair' && r.state === 'succeeded' && r.currentRoundTripTime)
                    document.getElementById('ping-val').innerText = `LATENCY: ${Math.round(r.currentRoundTripTime * 1000)} MS`;
            });
        }

        function render(txt, side) {
            const d = document.createElement('div');
            d.className = `flex ${side === 'me' ? 'justify-end' : 'justify-start'} mes-in`;
            const bubble = side === 'me' ? 'bg-cyan-600 text-white' : 'bg-slate-800 text-slate-200';
            d.innerHTML = `<div class="max-w-[85%] p-3 text-[11px] rounded-2xl ${bubble}">${DOMPurify.sanitize(txt)}</div>`;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function transmit() {
            const i = document.getElementById('msg-input');
            if (!i.value || dataChannel.readyState !== "open") return;
            const val = i.value; i.value = '';
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await crypto.subtle.importKey("raw", sendChainKey, "AES-GCM", false, ["encrypt"]);
            const enc = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(val));
            dataChannel.send(JSON.stringify({ iv: hex(iv), m: hex(enc) }));
            render(val, 'me');
            sendChainKey = await ratchet(sendChainKey, "step");
        }

        document.getElementById('create-btn').onclick = startOffer;
        document.getElementById('send-btn').onclick = transmit;
        document.getElementById('msg-input').onkeydown = e => { if(e.key === 'Enter') transmit(); };
        init();
    </script>
</body>
</html>
